<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - Parampara</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/theme.css" />
  <style>
    .offline-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      text-align: center;
      padding: 2rem;
    }
    .offline-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      color: var(--primary-color, #e67e22);
    }
    .offline-title {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: var(--text-color, #333);
    }
    .offline-message {
      font-size: 1.1rem;
      margin-bottom: 2rem;
      color: var(--text-muted, #666);
      max-width: 500px;
    }
    .retry-btn {
      background-color: var(--primary-color, #e67e22);
      color: white;
      border: none;
      padding: 0.8rem 2rem;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    .retry-btn:hover {
      background-color: var(--secondary-color, #d35400);
    }
  </style>
</head>
<body>
  <!-- Simplified Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">
        <h1>Parampara</h1>
        <p class="tagline">Preserving Living Traditions</p>
      </div>
    </div>
  </nav>

  <main class="offline-container">
    <div class="offline-icon">📡</div>
    <h1 class="offline-title">You are offline</h1>
    <p class="offline-message">
      It looks like you've lost your internet connection. 
      Parampara needs a connection to load new content. 
      However, previously visited pages may still be available from your cache.
    </p>
    <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
  </main>

  <script src="scripts/theme.js"></script>
  <script src="scripts/sw-register.js"></script>
<script src="scripts/breadcrumbs.js"></script>
</body>
</html>
